      - key: OP-65
        title: "Operator Trail Status Management"
        status: done
        type: feature
        githubIssue: null
        needsRefinement: false
        notes: |
          Builds on TrailCondition model (OP-37). Operator can post pinned status:
          OPEN / CLOSED / CAUTION / MUDDY / WET / SNOW with optional notes and expiry.
          isPinned=true + operatorId set for operator posts.
          Consumer side: pinned operator status shown prominently at top of conditions section
          with 'Posted by Park Management' badge, visually distinct from community reports.
          This is the #1 daily engagement feature for operators.
        tasks: []

      - key: OP-66
        title: "Operator Park Listing Editor"
        status: done
        type: feature
        githubIssue: null
        needsRefinement: false
        notes: |
          Operators edit their park listing without admin moderation queue.
