  # Epic 0: Data Quality & Photo Remediation (immediate)
  - id: E0
    key: data-quality
    name: "Data Quality & Photo Remediation"
    description: "Fix duplicate/misassigned photos, add deduplication guards, establish ongoing photo sourcing."
    stories:
      - key: OP-00
        title: "Photo Deduplication Audit & Cleanup"
        status: done
        type: bug
        githubIssue: null
        needsRefinement: false
        notes: |
          Run SQL: SELECT url, COUNT(*) as cnt, array_agg(DISTINCT "parkId") as parks
          FROM "ParkPhoto" GROUP BY url HAVING COUNT(*) > 1 ORDER BY cnt DESC;
          For each duplicate: the parkId embedded in the Vercel Blob URL path
          (parks/{parkId}/{timestamp}-{filename}) is the authoritative assignment.
          Delete ParkPhoto records where DB parkId != URL-embedded parkId.
          Add @@unique([url]) constraint to ParkPhoto model in schema.prisma.
        tasks: []

      - key: OP-00B
        title: "Admin Photo Reassign Tool"
        status: cancelled
        type: feature
        githubIssue: null
        needsRefinement: false
        notes: |
          Add 'Reassign Park' action to PhotoModerationTable.tsx.
          PATCH /api/admin/photos/[id] endpoint: updates parkId field.
          Park selector dropdown (search by name). Confirmation dialog.
          Also useful for ongoing corrections when photos are submitted for wrong park.
        tasks: []

      - key: OP-00C
        title: "Bulk Upload Deduplication Guard"
        status: cancelled
