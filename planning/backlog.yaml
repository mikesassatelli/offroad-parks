        notes: |
          Route: /operator/[parkSlug]/dashboard. Separate layout from /admin.
          Middleware: check OperatorUser membership and subscriptionStatus.
          PAST_DUE shows billing banner. CANCELLED shows paywall.
          Sidebar: Overview, Trail Status, Listing, Waivers (stub), Tickets (stub), Billing.
          Stats cards: trail status indicator, recent waiver count (stub), active members (stub).
